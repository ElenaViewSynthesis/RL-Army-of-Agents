[project]
name = "trajectoryos-rewards"
version = "0.1.0"
description = "Composable cost-aware reward for TrajectoryOS"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7",
    "trajectoryos-schemas",
]

[tool.uv.sources]
trajectoryos-schemas = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/trajectoryos"]
