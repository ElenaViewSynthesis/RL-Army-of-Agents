[project]
name = "trajectoryos-core"
version = "0.1.0"
description = "TrajectoryOS core utilities: config loading, structured logging, seeding"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7",
    "PyYAML>=6.0",
    "structlog>=24.1",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/trajectoryos"]
