[project]
name = "trajectoryos-verifiers"
version = "0.1.0"
description = "TrajectoryOS verifiers: clean-sandbox evaluation that agents cannot tamper with"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7",
    "trajectoryos-schemas",
    "trajectoryos-environments",
]

[tool.uv.sources]
trajectoryos-schemas = { workspace = true }
trajectoryos-environments = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/trajectoryos"]
