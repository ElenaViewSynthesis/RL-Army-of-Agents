[project]
name = "google-adk-agents"
version = "0.1.0"
description = "Multi-agent financial research orchestrator built on Google's Agent Development Kit (ADK)"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "google-adk>=2.3.0",
]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["finance_coordinator"]
